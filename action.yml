name: "difftrace"
description: "Change detection for uv monorepos — find affected packages from git diff"

inputs:
  base:
    description: "Base ref to diff against (auto-detected from event context when empty)"
    required: false
    default: ""
  lock-file:
    description: "Path(s) to uv.lock file(s). Use newline- or comma-separated values for multi-workspace monorepos."
    required: false
    default: "uv.lock"
  exclude-packages:
    description: "Comma-separated list of packages to exclude from the affected set"
    required: false
    default: ""
  no-dev:
    description: "Exclude dev dependencies from the dependency graph"
    required: false
    default: "false"
  no-optional:
    description: "Exclude optional dependencies from the dependency graph"
    required: false
    default: "false"
  direct-only:
    description: "Only output directly changed packages, skip transitive dependents"
    required: false
    default: "false"
  test-all:
    description: "Force testing all packages, skipping git diff entirely"
    required: false
    default: "false"
  root-triggers:
    description: "Comma-separated list of additional file/dir patterns that trigger test_all (e.g. 'Dockerfile,docker/'). Append / for directory prefixes."
    required: false
    default: ""
  verbose:
    description: "Enable debug logging to stderr"
    required: false
    default: "false"

outputs:
  affected:
    description: "JSON array of affected package names"
    value: ${{ steps.difftrace.outputs.affected }}
  matrix:
    description: 'JSON object for strategy.matrix. Single-lock: {"package": [...]}. Multi-lock: {"include": [{"package","workspace"}, ...]}.'
    value: ${{ steps.difftrace.outputs.matrix }}
  has_affected:
    description: '"true" if any packages are affected, "false" otherwise'
    value: ${{ steps.difftrace.outputs.has_affected }}
  test_all:
    description: '"true" if root config changed and all packages should be tested'
    value: ${{ steps.difftrace.outputs.test_all }}

branding:
  icon: "git-branch"
  color: "orange"

runs:
  using: "composite"
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true

    - name: Install difftrace
      shell: bash
      run: |
        echo "::group::Install difftrace"
        echo "Action path: ${{ github.action_path }}"
        uv tool install "${{ github.action_path }}"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "Installed version: $("$HOME/.local/bin/difftrace" --version 2>/dev/null || echo 'unknown')"
        echo "::endgroup::"

    - name: Resolve base ref
      id: resolve-base
      shell: bash
      run: |
        if [ -n "${{ inputs.base }}" ]; then
          echo "base=${{ inputs.base }}" >> "$GITHUB_OUTPUT"
          echo "Using explicit base ref: ${{ inputs.base }}"
        elif [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "base=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          echo "Auto-detected base ref for pull_request: origin/${{ github.base_ref }}"
        elif [ "${{ github.event_name }}" = "push" ]; then
          BEFORE="${{ github.event.before }}"
          NULL_SHA="0000000000000000000000000000000000000000"
          if [ "$BEFORE" = "$NULL_SHA" ]; then
            echo "base=origin/${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"
            echo "::warning::First push to branch — falling back to origin/${{ github.event.repository.default_branch }}"
          else
            echo "base=$BEFORE" >> "$GITHUB_OUTPUT"
            echo "Auto-detected base ref for push: $BEFORE"
          fi
        else
          echo "base=origin/${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"
          echo "Falling back to origin/${{ github.event.repository.default_branch }}"
        fi

    - name: Validate inputs
      shell: bash
      run: |
        echo "::group::Validate inputs"
        echo "base:             ${{ steps.resolve-base.outputs.base }}"
        echo "lock-file:        ${{ inputs.lock-file }}"
        echo "exclude-packages: ${{ inputs.exclude-packages }}"
        echo "no-dev:           ${{ inputs.no-dev }}"
        echo "no-optional:      ${{ inputs.no-optional }}"
        echo "direct-only:      ${{ inputs.direct-only }}"
        echo "test-all:         ${{ inputs.test-all }}"
        echo "root-triggers:    ${{ inputs.root-triggers }}"
        echo "verbose:          ${{ inputs.verbose }}"
        echo ""

        # Normalize newline- or comma-separated list → one lock file per line.
        LOCK_FILES=$(printf '%s' "${{ inputs.lock-file }}" | tr ',\n' '\n\n' | sed '/^\s*$/d' | awk '{$1=$1};1')
        if [ -z "$LOCK_FILES" ]; then
          echo "::error::No lock file provided"
          exit 1
        fi
        while IFS= read -r lf; do
          if [ ! -f "$lf" ]; then
            echo "::error::Lock file not found: $lf"
            exit 1
          fi
          echo "Lock file OK:      $(realpath "$lf")"
        done <<< "$LOCK_FILES"

        if ! git rev-parse --verify "${{ steps.resolve-base.outputs.base }}" >/dev/null 2>&1; then
          echo "::warning::Base ref '${{ steps.resolve-base.outputs.base }}' cannot be resolved — difftrace may fail. Try 'git fetch' or checkout with fetch-depth: 0."
        else
          base_sha=$(git rev-parse "${{ steps.resolve-base.outputs.base }}")
          head_sha=$(git rev-parse HEAD)
          echo "Base resolved to:  ${{ steps.resolve-base.outputs.base }} -> $base_sha"
          echo "HEAD:              $head_sha"
          echo ""
          echo "Changed files between base and HEAD:"
          git diff --name-only "$base_sha" "$head_sha" | sed 's/^/  /' || echo "  (unable to compute diff)"
        fi
        echo "::endgroup::"

    - name: Run difftrace
      id: difftrace
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::Build difftrace flags"
        LOCK_FILES=$(printf '%s' "${{ inputs.lock-file }}" | tr ',\n' '\n\n' | sed '/^\s*$/d' | awk '{$1=$1};1')
        LOCK_ARGS=()
        while IFS= read -r lf; do
          LOCK_ARGS+=(--lock-file "$lf")
        done <<< "$LOCK_FILES"

        FLAGS=""
        if [ -n "${{ inputs.exclude-packages }}" ]; then
          IFS=',' read -ra PKGS <<< "${{ inputs.exclude-packages }}"
          for pkg in "${PKGS[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            if [ -n "$pkg" ]; then
              FLAGS="$FLAGS --exclude $pkg"
            fi
          done
        fi
        if [ "${{ inputs.no-dev }}" = "true" ]; then
          FLAGS="$FLAGS --no-dev"
        fi
        if [ "${{ inputs.no-optional }}" = "true" ]; then
          FLAGS="$FLAGS --no-optional"
        fi
        if [ "${{ inputs.direct-only }}" = "true" ]; then
          FLAGS="$FLAGS --direct-only"
        fi
        if [ "${{ inputs.test-all }}" = "true" ]; then
          FLAGS="$FLAGS --test-all"
        fi
        if [ -n "${{ inputs.root-triggers }}" ]; then
          IFS=',' read -ra TRIGGERS <<< "${{ inputs.root-triggers }}"
          for trigger in "${TRIGGERS[@]}"; do
            trigger=$(echo "$trigger" | xargs)
            if [ -n "$trigger" ]; then
              FLAGS="$FLAGS --root-trigger $trigger"
            fi
          done
        fi
        if [ "${{ inputs.verbose }}" = "true" ]; then
          FLAGS="$FLAGS --verbose"
        fi
        echo "Command: difftrace --base \"${{ steps.resolve-base.outputs.base }}\" ${LOCK_ARGS[*]} $FLAGS --json"
        echo "::endgroup::"

        echo "::group::Run difftrace"
        result=$(difftrace --base "${{ steps.resolve-base.outputs.base }}" "${LOCK_ARGS[@]}" $FLAGS --json)
        echo "Raw result:"
        echo "$result" | python3 -m json.tool || echo "$result"
        echo "::endgroup::"

        echo "::group::Compute outputs"
        _dt_out=$(mktemp)
        DIFFTRACE_RESULT="$result" python3 > "$_dt_out" <<'PY'
        import os, json
        data = json.loads(os.environ['DIFFTRACE_RESULT'])
        aff = data['affected']
        if aff and isinstance(aff[0], dict):
            affected = [(e['workspace'] + '/' + e['name']) if e['workspace'] else e['name'] for e in aff]
            matrix = {'include': [{'package': e['name'], 'workspace': e['workspace']} for e in aff]}
        else:
            affected = aff
            matrix = {'package': aff}
        print(json.dumps(affected))
        print(json.dumps(matrix))
        print(str(data['test_all']).lower())
        print(len(aff))
        PY
        { read -r affected; read -r matrix; read -r test_all; read -r count; } < "$_dt_out"
        rm -f "$_dt_out"

        if [ "$affected" = "[]" ]; then
          has_affected="false"
        else
          has_affected="true"
        fi

        echo "affected:     $affected"
        echo "matrix:       $matrix"
        echo "has_affected: $has_affected"
        echo "test_all:     $test_all"
        echo "count:        $count"

        echo "affected=$affected" >> "$GITHUB_OUTPUT"
        echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
        echo "has_affected=$has_affected" >> "$GITHUB_OUTPUT"
        echo "test_all=$test_all" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

        LOCK_FILES_SUMMARY=$(printf '%s' "$LOCK_FILES" | tr '\n' ' ')
        {
          echo "### difftrace"
          echo ""
          echo "| output | value |"
          echo "| --- | --- |"
          echo "| base | \`${{ steps.resolve-base.outputs.base }}\` |"
          echo "| lock-files | \`$LOCK_FILES_SUMMARY\` |"
          echo "| has_affected | \`$has_affected\` |"
          echo "| test_all | \`$test_all\` |"
          echo "| affected count | \`$count\` |"
          echo ""
          echo "<details><summary>Affected packages</summary>"
          echo ""
          echo '```json'
          echo "$affected"
          echo '```'
          echo ""
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"
